<style>
  :root { --bg:#0a1a2a; }

  html,body { margin:0; height:100%; overflow:hidden; background:var(--bg);

  #langBtn { position:fixed; top:12px; right:12px; z-index:8; border:none; border-radius:50%;

  #langBtn:active { transform:scale(.9); }

  #infoModal { position:fixed; inset:0; z-index:20; display:flex; align-items:center; justify-content:center;

  #clockCanvas { position:fixed; left:10px; bottom:74px; z-index:6; width:min(40vw,190px); height:auto;
    filter:drop-shadow(0 6px 14px rgba(0,0,0,.4)); cursor:pointer; }
  #bigClock { position:fixed; inset:0; z-index:25; display:flex; align-items:center; justify-content:center;
    background:rgba(4,10,18,.72); backdrop-filter:blur(5px); padding:16px; animation:bcFade .25s ease; }
  @keyframes bcFade { from{opacity:0} to{opacity:1} }
  #bigClockInner { position:relative; animation:bcPop .35s cubic-bezier(.2,1.4,.4,1); }
  @keyframes bcPop { from{transform:scale(.5);opacity:0} to{transform:scale(1);opacity:1} }
  #bigClockCanvas { width:min(86vw,460px); height:auto; display:block; }
  #bigClockClose { position:absolute; top:-6px; right:-6px; z-index:2; border:none; background:rgba(20,12,6,.8);
    color:#f0e0c8; border-radius:50%; width:34px; height:34px; cursor:pointer; font-size:15px; }
  #owlHelper { position:absolute; right:-8px; bottom:-6px; border:none; background:none; cursor:pointer; padding:0;
    animation:owlBob 2.2s ease-in-out infinite; }
  #owlHelper:active { transform:scale(.9); }
  @keyframes owlBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  #owlCanvas { width:80px; height:80px; display:block; }
  #clockSpeech { position:absolute; right:70px; bottom:36px; max-width:200px; background:#fffdf6; color:#22323f;
    border-radius:14px; padding:10px 14px; font-size:15px; font-weight:600; box-shadow:0 6px 18px rgba(0,0,0,.35);
    animation:bcPop .3s ease; }

  #phaseMenu { position:fixed; left:10px; bottom:74px; z-index:22; display:flex; flex-direction:column; gap:4px;

    box-shadow:0 10px 30px rgba(0,0,0,.5); }
  #phaseMenu button { border:none; background:rgba(255,255,255,.06); color:#dfeaf5; text-align:left;

  #phaseMenu button.on { background:rgba(232,68,58,.4); }
  #start { position:fixed; inset:0; z-index:10; cursor:pointer; overflow:hidden;

    transition:opacity .35s ease; }

  #start.zoom #poster { transform:scale(6); }
</style>

<!-- versione: generata da deploy.sh (git describe) -->
<script src="lib/version.js"></script>
<!-- configurazione (nome del bambino, posizione) -->

<!-- motore "fisso" (lingue, astronomia) -->
<script src="lib/sun.js"></script>
<script src="lib/languages.js"></script>

<script src="locales/en-US.js"></script>
<!-- contenuto editabile (personaggi, scenari, forme) -->

<!-- motore -->
<script>
// ═══════════════════════════════════════════════════════════════════
//  IL MONDO DI ELIANA — motore (v1.1, modulare)
//  Contenuto editabile in file separati:
//    • characters.js    → i personaggi (aggiungi/modifica gli amici)
//    • environments.js  → gli scenari (laghetto/foresta/…)
//    • creatures.js     → le forme dei corpi (drawCreature)
//  Questo file = impianto: audio, movimento, orologio, render, loop.
//  ponytail: zero dipendenze, audio sintetizzato, canvas 2D.
//  (CAST, BYID, BASE, LAYERS, drawCreature, I18N/L/charInfo arrivano dai file sopra.)
// ═══════════════════════════════════════════════════════════════════
// APP_VERSION arriva da version.js (generato da deploy.sh via git describe).
const APP_VERSION = (typeof window!=='undefined' && window.APP_VERSION) ? window.APP_VERSION : 'dev';

// ── CANVAS ─────────────────────────────────────────────────────────
const cv = document.getElementById('stage'); let ctx = cv.getContext('2d');
let W,H,DPR;
function resize(){
  DPR=Math.min(2,window.devicePixelRatio||1);
  W=cv.width=innerWidth*DPR; H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px'; cv.style.height=innerHeight+'px';
}
addEventListener('resize',resize); resize();

// ── hover (mouse) + tap (touch): mostra il nome dell'animale ───────
cv.addEventListener('mousemove',e=>{
  const r=cv.getBoundingClientRect();
  const px=(e.clientX-r.left)*DPR, py=(e.clientY-r.top)*DPR;
  hoverBeing=beingAt(px,py);
  hoverAstro = !hoverBeing && ((px-astro.x)**2+(py-astro.y)**2 < (astro.r*1.3)**2);
  hoverClearT=0;
});
cv.addEventListener('mouseleave',()=>{ hoverBeing=null; hoverAstro=false; });
cv.addEventListener('pointerdown',e=>{
  if(e.pointerType==='mouse') return; // il mouse usa hover
  const r=cv.getBoundingClientRect();
  const px=(e.clientX-r.left)*DPR, py=(e.clientY-r.top)*DPR;
  const hit=beingAt(px,py);
  if(hit){ hoverBeing=hit; hoverClearT=performance.now()+2000; } // nome per 2s
  else if((px-astro.x)**2+(py-astro.y)**2 < (astro.r*1.3)**2){ hoverAstro=true; hoverClearT=performance.now()+2000; }
});

let day=0.8;
const beings=[];
let hoverBeing=null, hoverClearT=0;
let hoverAstro=false;
const astro={x:0,y:0,r:0,night:false};
// hit-test: trova l'animale sotto il punto (coord canvas già in DPR)
function beingAt(px,py){
  for(let i=beings.length-1;i>=0;i--){ const b=beings[i];
    const r=b.size*DPR*1.4;
    if((px-b.x)**2+(py-b.y)**2 < r*r) return b; }
  return null;
}

function addBeing(id){
  const s=BYID[id]; if(!s) return;
  beings.push({...s, x:Math.random()*W, y:H*(BASE.horizon+0.05)+Math.random()*H*0.28,
    vx:(Math.random()-0.5), vy:(Math.random()-0.5), phase:Math.random()*6.28,
    nextSound:performance.now()+Math.random()*3000, sleep:0, hopT:Math.random(), face:Math.random()<0.5?1:-1});
  if(AC) chirp(s.sound,0.6);
}

// ── AUDIO ──────────────────────────────────────────────────────────
let AC,master,ambGain,ambLP,ambSrc,ambLFO;
function initAudio(){
  AC=new (window.AudioContext||window.webkitAudioContext)();
  master=AC.createGain(); master.gain.value=0.9; master.connect(AC.destination);
  buildAmbient();
}
function buildAmbient(){
  const buf=AC.createBuffer(1,AC.sampleRate*2,AC.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.5;
  ambSrc=AC.createBufferSource(); ambSrc.buffer=buf; ambSrc.loop=true;
  ambLP=AC.createBiquadFilter(); ambLP.type='lowpass'; ambLP.frequency.value=520; ambLP.Q.value=0.7;
  ambGain=AC.createGain(); ambGain.gain.value=0.12;
  ambLFO=AC.createOscillator(); ambLFO.frequency.value=0.06;
  const lg=AC.createGain(); lg.gain.value=180; ambLFO.connect(lg); lg.connect(ambLP.frequency);
  ambSrc.connect(ambLP); ambLP.connect(ambGain); ambGain.connect(master);
  ambSrc.start(); ambLFO.start();
  applyEnvAudio();
}
function applyEnvAudio(){
  if(!ambLP) return;
  // somma dei layer natura attivi: volume totale + cutoff medio pesato
  let g=0, cutSum=0, cutW=0;
  for(const k in LAYERS){ const Lr=LAYERS[k]; if(Lr.on && Lr.amb){ g+=Lr.amb.g; if(Lr.amb.cut>0){ cutSum+=Lr.amb.cut*Lr.amb.g; cutW+=Lr.amb.g; } } }
  ambLP.frequency.value = cutW>0 ? cutSum/cutW : 600;
  ambGain.gain.value = Math.min(0.2, g);
}
function ambBaseGain(){ let g=0; for(const k in LAYERS){ const Lr=LAYERS[k]; if(Lr.on&&Lr.amb) g+=Lr.amb.g; } return Math.min(0.2,g); }
function chirp(sound,vol=1){
  if(!AC) return;
  const t=AC.currentTime, o=AC.createOscillator(); o.type=sound.type;
  o.frequency.value=sound.base*(0.9+Math.random()*0.2); o.detune.value=(Math.random()*2-1)*40;
  const g=AC.createGain();
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.16*vol,t+0.02);
  g.gain.exponentialRampToValueAtTime(0.0008,t+0.35);
  o.connect(g); g.connect(master); o.start(t); o.stop(t+0.4);
}

// ── MOVIMENTO ──────────────────────────────────────────────────────
function stepBeing(b,dt){
  const awake=1-b.sleep;
  if(b.sleep>0.98) return;
  const sp=b.speed*awake*DPR; b.phase+=0.02;
  switch(b.motion){
    case 'float': b.vx+=Math.cos(b.phase)*0.02; b.vy+=Math.sin(b.phase*0.7)*0.02; break;
    case 'dart':  if(Math.random()<0.02){const a=Math.random()*6.28;b.vx=Math.cos(a)*2.2;b.vy=Math.sin(a)*2.2;} break;
    case 'hop':   b.hopT+=dt*0.05*awake; if(b.hopT>1){b.hopT=0;const a=Math.random()*6.28;b.vx=Math.cos(a)*1.8;b.vy=Math.sin(a)*1.8;} b.vx*=0.94;b.vy*=0.94; break;
    case 'crawl': b.vx+=(Math.random()-0.5)*0.05; b.vy+=(Math.random()-0.5)*0.03; b.vx*=0.9;b.vy*=0.9; break;
    default:      b.vx+=(Math.random()-0.5)*0.15; b.vy+=(Math.random()-0.5)*0.15;
  }
  const mag=Math.hypot(b.vx,b.vy)||1, max=1.4;
  if(mag>max){b.vx=b.vx/mag*max;b.vy=b.vy/mag*max;}
  if(Math.abs(b.vx)>0.05) b.face=b.vx>0?1:-1;
  b.x+=b.vx*sp; b.y+=b.vy*sp;
  const m=30*DPR;
  if(b.x<m){b.x=m;b.vx=Math.abs(b.vx);} if(b.x>W-m){b.x=W-m;b.vx=-Math.abs(b.vx);}
  const yTop=H*(BASE.horizon+0.02);   // animali sul PRATO, sotto l'orizzonte (niente più creature volanti)
  if(b.y<yTop){b.y=yTop;b.vy=Math.abs(b.vy);} if(b.y>H-m-70){b.y=H-m-70;b.vy=-Math.abs(b.vy);}
  const now=performance.now();
  if(now>b.nextSound){
    if(awake>0.25 && Math.random()<b.sound.rate*0.5){ chirp(b.sound,awake); b.glowT=now; } // bagliore quando "parla"
    b.nextSound=now+700+Math.random()*2600/(awake+0.1);
  }
}

// ── SILHOUETTE per specie (stile geometrico) ───────────────────────
// disegna centrato in (0,0), scala sz, guardando a destra (face gestito fuori)
// drawCreature() vive in creatures.js (le forme dei corpi). Qui c'è solo il render della scena.

// ── RENDER scena ───────────────────────────────────────────────────
let ripples=[]; for(let i=0;i<7;i++) ripples.push({x:Math.random(),y:Math.random()*0.4+0.55,sp:0.1+Math.random()*0.2});
function draw(){
  const dn=1-day;   // dn = quanto è notte (0=giorno pieno, 1=notte fonda)
  // CIELO base
  const top=mix(BASE.skyDay[0],BASE.skyNight[0],dn), bot=mix(BASE.skyDay[1],BASE.skyNight[1],dn);
  const g=ctx.createLinearGradient(0,0,0,H*BASE.horizon); g.addColorStop(0,rgb(top)); g.addColorStop(1,rgb(bot));
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H*BASE.horizon);
  const t=performance.now()/1000;
  // NUVOLE che scorrono lente nel cielo (riempiono lo spazio, si diradano di notte)
  const cloudA=0.85-dn*0.7;
  if(cloudA>0.04){
    ctx.fillStyle=`rgba(255,255,255,${cloudA})`;
    const clouds=[[0.0,0.12,1.0],[0.0,0.26,0.7],[0.0,0.18,1.3]];
    for(let ci=0; ci<clouds.length; ci++){ const c=clouds[ci];
      const speed=6+ci*4, cw=W*0.16*c[2];
      let cxp=((c[0]+ t*speed/W*10) % 1.3 - 0.15); // scorre e ricicla
      const cx=cxp*W, cy=H*c[1];
      // nuvola = 3 bolle sovrapposte
      ctx.beginPath();
      ctx.ellipse(cx,cy,cw*0.6,cw*0.32,0,0,6.2832);
      ctx.ellipse(cx+cw*0.5,cy+cw*0.05,cw*0.5,cw*0.28,0,0,6.2832);
      ctx.ellipse(cx-cw*0.5,cy+cw*0.06,cw*0.45,cw*0.26,0,0,6.2832);
      ctx.fill();
    }
  }
  // astro: sole di giorno, luna di notte
  const ax=W*0.82, ay=H*0.15, ar=26*DPR;
  astro.x=ax; astro.y=ay; astro.r=ar;   // per l'hit-test dell'hover
  // "ora" percepita per colorare l'astro: reale se auto, stimata dallo slider se manuale
  const hr = curHour; // ora reale (il mondo segue sempre l'orologio)
  // notte: da sun.js se disponibile (e non in modalità debug fase), altrimenti soglia fissa
  let isNight;
  if(forceDay===null && typeof solarDay==='function'){ const sd=solarDay(new Date()); isNight = sd ? sd.isNight : (hr>=21||hr<6); }
  else isNight = (hr>=21 || hr<6);
  astro.night=isNight;
  if(isNight){
    // LUNA: gialla la sera (18-22) e verso l'alba (4-6), bianca a notte fonda
    let moon;
    if(hr>=18&&hr<23) moon=[255,236,170];        // sera: gialla
    else if(hr>=4&&hr<7) moon=[255,240,190];       // pre-alba: gialla tenue
    else moon=[236,240,255];                        // notte fonda: bianca
    ctx.beginPath(); ctx.arc(ax,ay,ar,0,6.29); ctx.fillStyle=`rgba(${moon[0]},${moon[1]},${moon[2]},${0.6+dn*0.4})`; ctx.fill();
    // mezzaluna: cerchio del colore del cielo che "morde" la luna
    ctx.beginPath(); ctx.arc(ax+ar*0.5,ay-ar*0.25,ar*0.92,0,6.29); ctx.fillStyle=rgb(top); ctx.fill();
  } else {
    // SOLE: alba giallo chiaro → mezzogiorno giallo pieno → tramonto rosso
    let sun;
    if(hr<11)      sun=[255,238,170];   // mattino/alba: giallo chiaro
    else if(hr<15) sun=[255,216,70];    // mezzogiorno: giallo pieno
    else           sun=[255,120,60];    // pomeriggio/tramonto: rosso-arancio
    // alone caldo
    const glow=ctx.createRadialGradient(ax,ay,ar*0.6,ax,ay,ar*2.2);
    glow.addColorStop(0,`rgba(${sun[0]},${sun[1]},${sun[2]},.5)`); glow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(ax,ay,ar*2.2,0,6.29); ctx.fill();
    ctx.beginPath(); ctx.arc(ax,ay,ar,0,6.29); ctx.fillStyle=`rgb(${sun[0]},${sun[1]},${sun[2]})`; ctx.fill();
  }
  // ===== ELEMENTI NATURA (layer fissi, combinabili) =====
  const H0=H*BASE.horizon;
  // MONTAGNE (in alto, lontane sullo sfondo del cielo)
  if(LAYERS.montagne.on){
    const mc=mix([120,130,150],[30,40,66],dn);
    const mBase=H0;   // base sull'orizzonte; picchi più alti = montagne che svettano nel cielo
    const peaks=[[0.12,0.34],[0.30,0.52],[0.52,0.40],[0.72,0.56],[0.90,0.38]];
    for(const p of peaks){ const x=p[0]*W, hh=H0*p[1];
      ctx.fillStyle=rgb(mc);
      ctx.beginPath(); ctx.moveTo(x-hh*1.1,mBase); ctx.lineTo(x,mBase-hh); ctx.lineTo(x+hh*1.1,mBase); ctx.closePath(); ctx.fill();
      ctx.fillStyle=`rgba(255,255,255,${0.5-0.3*dn})`;
      ctx.beginPath(); ctx.moveTo(x-hh*0.3,mBase-hh*0.75); ctx.lineTo(x,mBase-hh); ctx.lineTo(x+hh*0.3,mBase-hh*0.75); ctx.closePath(); ctx.fill();
    }
  }
  // PRATO base (terra)
  const gc=mix(BASE.groundDay,BASE.groundNight,dn);
  ctx.fillStyle=rgb(gc); ctx.fillRect(0,H0,W,H-H0);
  // ===== SISTEMA ACQUA (laghetto → fiume → mare, coerente) =====
  const waterCol=mix([80,155,205],[11,30,63],dn);
  const seaTop=H*0.82;
  const seaOn=LAYERS.mare.on;
  // MARE (fascia bassa) — disegnato per primo così il fiume ci sfocia dentro
  if(seaOn){
    ctx.fillStyle=rgb(waterCol); ctx.fillRect(0,seaTop,W,H-seaTop);
    ctx.strokeStyle=`rgba(255,255,255,${0.08+0.06*dn})`; ctx.lineWidth=1*DPR;
    for(const rp of ripples){ const yy=seaTop+(H-seaTop)*rp.y+Math.sin(t*rp.sp*6+rp.x*9)*4*DPR;
      ctx.beginPath(); for(let x=0;x<=W;x+=16*DPR){ const y=yy+Math.sin(x/W*8+t*rp.sp*4+rp.x*10)*3*DPR; x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);} ctx.stroke(); }
  }
  // LAGHETTO (in alto a sinistra) + FIUME che scende
  if(LAYERS.laghetto.on){
    const lx=W*0.28, ly=H0+H*0.06, lrx=W*0.15, lry=H*0.055;
    const riverEnd = seaOn ? seaTop+H*0.01 : H;   // sfocia nel mare, o esce dallo schermo
    // FIUME: corso FISSO che scende dal laghetto (i fiumi non cambiano corso nel tempo)
    const rw=W*0.05;
    ctx.fillStyle=rgb(waterCol);
    ctx.beginPath();
    ctx.moveTo(lx-rw*0.5, ly);
    for(let yy=ly; yy<=riverEnd; yy+=8*DPR){ const k=(yy-ly)/(riverEnd-ly); const mx=lx + Math.sin(k*6)*W*0.04*(0.4+k); ctx.lineTo(mx-rw*(0.5+k*0.4), yy); }
    for(let yy=riverEnd; yy>=ly; yy-=8*DPR){ const k=(yy-ly)/(riverEnd-ly); const mx=lx + Math.sin(k*6)*W*0.04*(0.4+k); ctx.lineTo(mx+rw*(0.5+k*0.4), yy); }
    ctx.closePath(); ctx.fill();
    // specchio del laghetto
    ctx.beginPath(); ctx.ellipse(lx,ly,lrx,lry,0,0,6.2832); ctx.fillStyle=rgb(waterCol); ctx.fill();
    ctx.strokeStyle=`rgba(255,255,255,${0.10+0.06*dn})`; ctx.lineWidth=1*DPR;
    for(let i=1;i<=3;i++){ const ry2=lry*(i/4)+Math.sin(t*0.8+i)*1.5*DPR;
      ctx.beginPath(); ctx.ellipse(lx,ly,lrx*(i/4)*1.4,ry2,0,0,6.2832); ctx.stroke(); }
  }
  // BOSCO (alberi a destra, ondeggiano)
  if(LAYERS.bosco.on){
    const tc=mix([40,110,60],[8,30,20],dn), trunk=mix([90,60,35],[20,16,12],dn);
    for(let i=0;i<5;i++){ const x=W*(0.62+i*0.09), hh=H*(0.14+((i*7)%5)/28), sway=Math.sin(t*0.8+i*1.3)*hh*0.05;
      ctx.fillStyle=rgb(trunk); ctx.fillRect(x-hh*0.06, H0-hh*0.1, hh*0.12, hh*0.5);
      ctx.fillStyle=rgb(tc);
      ctx.beginPath(); ctx.moveTo(x-hh*0.5,H0); ctx.lineTo(x+sway,H0-hh*1.1); ctx.lineTo(x+hh*0.5,H0); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(x-hh*0.4,H0-hh*0.4); ctx.lineTo(x+sway*0.7,H0-hh*1.35); ctx.lineTo(x+hh*0.4,H0-hh*0.4); ctx.closePath(); ctx.fill();
    }
  }
  // FIORI (sparsi sul prato)
  if(LAYERS.fiori.on){
    const cols=['#ff6a8a','#ffd23a','#c79bff','#ff9ecb','#7fe0a0'];
    for(let i=0;i<18;i++){ const x=((i*53)%100)/100*W, y=H0+((i*37)%100)/100*(H-H0)*0.85+(H-H0)*0.05;
      const sway=Math.sin(t*1.2+i)*2*DPR, col=cols[i%cols.length];
      ctx.strokeStyle=rgb(mix([70,140,70],[16,40,24],dn)); ctx.lineWidth=1.5*DPR;
      ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+sway,y-8*DPR); ctx.stroke();
      ctx.globalAlpha=1-dn*0.5; ctx.fillStyle=col;
      ctx.beginPath(); ctx.arc(x+sway,y-9*DPR,3*DPR,0,6.2832); ctx.fill(); ctx.globalAlpha=1;
    }
  }
  // personaggi
  for(const b of beings){
    ctx.save(); ctx.translate(b.x,b.y);
    const bob=b.motion==='hop'?Math.sin(b.hopT*Math.PI)*b.size*0.5*DPR*(1-b.sleep):0;
    ctx.translate(0,-bob);
    const sz=b.size*DPR*(1-b.sleep*0.15);
    // bagliore quando "parla" (svanisce in ~600ms) — attira l'attenzione
    if(b.glowT){ const age=performance.now()-b.glowT;
      if(age<600){ const k=1-age/600; // 1 → 0
        const gr=sz*(1.8+1.2*(1-k));   // si espande mentre svanisce
        const gg=ctx.createRadialGradient(0,0,sz*0.5,0,0,gr);
        gg.addColorStop(0, hexA(b.colors[0], 0.55*k));
        gg.addColorStop(1, hexA(b.colors[0], 0));
        ctx.beginPath(); ctx.arc(0,0,gr,0,6.29); ctx.fillStyle=gg; ctx.fill();
      } else b.glowT=0;
    }
    // alone
    ctx.beginPath(); ctx.arc(0,0,sz*1.7,0,6.29); ctx.fillStyle=hexA(b.colors[0],0.10*(1-b.sleep)); ctx.fill();
    ctx.scale(b.face,1);
    ctx.globalAlpha=0.6+0.4*(1-b.sleep);
    drawCreature(b,sz);
    ctx.globalAlpha=1;
    ctx.restore();
    // Z se dorme
    if(b.sleep>0.7){ ctx.fillStyle=`rgba(220,235,255,${(b.sleep-0.7)*2})`; ctx.font=`${b.size*0.8*DPR}px serif`;
      ctx.fillText('z', b.x+b.size*DPR, b.y-b.size*1.4*DPR); }
  }
  // etichetta nome su hover (mouse) o tap (touch)
  if(hoverBeing && beings.includes(hoverBeing)){
    const b=hoverBeing, s=b.size*DPR;
    ctx.font=`700 ${Math.round(13*DPR)}px system-ui,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.lineWidth=Math.max(2,3*DPR); ctx.strokeStyle='rgba(0,0,0,.72)'; ctx.lineJoin='round';
    ctx.strokeText(b.name, b.x, b.y - s*1.9);
    ctx.fillStyle='#fff'; ctx.fillText(b.name, b.x, b.y - s*1.9);
  }
  // etichetta sole/luna su hover
  if(hoverAstro && L){
    const label = astro.night ? (L.moon||'Luna') : (L.sun||'Sole');
    ctx.font=`700 ${Math.round(13*DPR)}px system-ui,sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.lineWidth=Math.max(2,3*DPR); ctx.strokeStyle='rgba(0,0,0,.72)'; ctx.lineJoin='round';
    ctx.strokeText(label, astro.x, astro.y + astro.r + 6*DPR);
    ctx.fillStyle='#fff'; ctx.fillText(label, astro.x, astro.y + astro.r + 6*DPR);
  }
}

// ── HELPERS ────────────────────────────────────────────────────────
function mix(a,b,t){ return a.map((v,i)=>Math.round(v*(1-t)+b[i]*t)); }
function rgb(a){ return `rgb(${a[0]},${a[1]},${a[2]})`; }
function hexA(hex,a){ const n=parseInt(hex.slice(1),16); return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`; }

// ── LOOP ───────────────────────────────────────────────────────────
let last=performance.now();
function loop(now){
  const dt=Math.min(50,now-last); last=now;
  if(hoverClearT && now>hoverClearT){ hoverBeing=null; hoverAstro=false; hoverClearT=0; } // scade il tap-label
  const wantSleep=day<0.35?1:(day<0.5?(0.5-day)/0.15:0);
  for(const b of beings){ b.sleep+=(wantSleep-b.sleep)*0.02; stepBeing(b,dt); }
  if(ambGain){ ambGain.gain.value=ambBaseGain()+(1-day)*0.04; }
  draw(); requestAnimationFrame(loop);
}

// disegna la mini-anteprima della creatura per le chip
function drawMini(g,c){
  drawCreatureOn(g,c,22,38,44);
}
// versione parametrica (silhouette minimale su contesto g, per le chip)
function drawCreatureOn(g,c,sz,cx,cy){
  g.save(); g.translate(cx,cy);
  // riusa la logica: copio chiamando drawCreature ma serve ctx globale → semplifico: ridisegno alone+forma basilare
  g.beginPath(); g.arc(0,0,sz*1.4,0,6.29); g.fillStyle=hexA(c.colors[0],0.15); g.fill();
  // corpo
  g.beginPath(); g.ellipse(0,0,sz*0.9,sz*0.72,0,0,6.29); g.fillStyle=c.colors[0]; g.fill();
  // marchio specie minimale
  const acc=c.colors[1]||c.colors[0];
  if(c.species==='cat'||c.species==='wolf'){ tr(g,-sz*0.5,-sz*0.5,-sz*0.3,-sz*1.05,-sz*0.05,-sz*0.45,c.colors[0]); tr(g,sz*0.5,-sz*0.5,sz*0.3,-sz*1.05,sz*0.05,-sz*0.45,c.colors[0]); }
  if(c.species==='dog'||c.species==='cow'||c.species==='monkey'){ g.beginPath(); g.ellipse(-sz*0.7,-sz*0.2,sz*0.25,sz*0.4,0,0,6.29); g.fillStyle=acc; g.fill(); g.beginPath(); g.ellipse(sz*0.7,-sz*0.2,sz*0.25,sz*0.4,0,0,6.29); g.fill(); }
  if(c.species==='owl'){ g.fillStyle='#20303a'; g.beginPath(); g.arc(-sz*0.35,-sz*0.2,sz*0.28,0,6.29); g.fill(); g.beginPath(); g.arc(sz*0.35,-sz*0.2,sz*0.28,0,6.29); g.fill(); g.fillStyle=acc; g.beginPath(); g.arc(-sz*0.35,-sz*0.2,sz*0.12,0,6.29); g.fill(); g.beginPath(); g.arc(sz*0.35,-sz*0.2,sz*0.12,0,6.29); g.fill(); }
  if(c.species==='caterpillar'){ for(let i=0;i<4;i++){ g.beginPath(); g.arc((i-1.5)*sz*0.5,0,sz*0.4,0,6.29); g.fillStyle=c.colors[i%c.colors.length]; g.fill(); } }
  if(c.species==='hedgehog'){ for(let i=-2;i<=2;i++) tr(g,i*sz*0.3,-sz*0.3,i*sz*0.3-sz*0.1,-sz*1.0,i*sz*0.3+sz*0.1,-sz*0.3,acc); }
  g.restore();
}
function tr(g,x1,y1,x2,y2,x3,y3,f){ g.beginPath(); g.moveTo(x1,y1); g.lineTo(x2,y2); g.lineTo(x3,y3); g.closePath(); g.fillStyle=f; g.fill(); }

let autoClock=true;   // il mondo segue SEMPRE l'ora reale (ritmo lento, no controlli per Eliana)
let forceDay=null;    // easter egg debug: null=auto, oppure valore day fisso (0..1)
let curHour=12;
// mappa fasi debug → (day, ora rappresentativa per colore astro)
const PHASES={ alba:[0.5,6.5], giorno:[1,12], tramonto:[0.45,19.5], notte:[0,2] };
// ora reale (0..1) → day (1=giorno pieno, 0=notte). Curva alba/tramonto morbida.
function dayFromClock(){
  if(forceDay!==null) return PHASES[forceDay][0];
  const now=new Date();
  const sd = (typeof solarDay==='function') ? solarDay(now) : null;
  if(sd) return sd.day;              // alba/tramonto REALI (sun.js + config)
  // fallback soglie fisse se manca config/sun.js
  const h=now.getHours()+now.getMinutes()/60;
  let d;
  if(h<5||h>=22) d=0;
  else if(h<8)  d=(h-5)/3;
  else if(h<18) d=1;
  else if(h<22) d=1-(h-18)/4;
  else d=0;
  return Math.max(0,Math.min(1,d));
}
function tickClock(){
  const now=new Date();
  curHour = forceDay!==null ? PHASES[forceDay][1] : now.getHours()+now.getMinutes()/60;
  day=dayFromClock();
}

// ── OROLOGIO ANALOGICO (impara a leggere le ore) ──────────────
const clockCanvas=document.getElementById('clockCanvas');
function drawAnalogClock(targetCanvas){
  const cvx=targetCanvas||clockCanvas, gx=cvx.getContext('2d');
  const dpr=Math.min(2,window.devicePixelRatio||1);
  const W0=440,H0=300; if(cvx.width!==W0*dpr){ cvx.width=W0*dpr; cvx.height=H0*dpr; }
  const w=cvx.width, h=cvx.height, u=w/440;
  gx.clearRect(0,0,w,h);
  const cx=w/2;
  // ===== CORPO TAMBOUR (cappello di Napoleone), legno rovere miele =====
  const baseY=h-34*u;          // linea d'appoggio
  const humpY=34*u;            // cima della gobba
  const halfW=200*u;           // semi-larghezza alla base
  const lx=cx-halfW, rx=cx+halfW;
  gx.save(); gx.shadowColor='rgba(0,0,0,.4)'; gx.shadowBlur=22*u; gx.shadowOffsetY=9*u;
  gx.beginPath();
  gx.moveTo(lx, baseY);
  // fianco sinistro sale dolce
  gx.lineTo(lx, baseY-40*u);
  gx.quadraticCurveTo(lx, baseY-80*u, cx-140*u, baseY-95*u);
  // gobba centrale
  gx.quadraticCurveTo(cx-70*u, humpY-6*u, cx, humpY);
  gx.quadraticCurveTo(cx+70*u, humpY-6*u, cx+140*u, baseY-95*u);
  // fianco destro scende
  gx.quadraticCurveTo(rx, baseY-80*u, rx, baseY-40*u);
  gx.lineTo(rx, baseY);
  // base coi piedini
  gx.quadraticCurveTo(rx, baseY+14*u, rx-24*u, baseY+14*u);
  gx.lineTo(lx+24*u, baseY+14*u);
  gx.quadraticCurveTo(lx, baseY+14*u, lx, baseY);
  gx.closePath();
  const wood=gx.createLinearGradient(0,humpY,0,baseY);
  wood.addColorStop(0,'#d9a668'); wood.addColorStop(.5,'#c08a4a'); wood.addColorStop(1,'#a06e35');
  gx.fillStyle=wood; gx.fill();
  gx.restore();
  gx.lineWidth=5*u; gx.strokeStyle='#7a5220'; gx.stroke();
  // venature legno
  gx.lineWidth=1.5*u; gx.strokeStyle='rgba(120,70,20,.25)';
  for(let i=0;i<4;i++){ gx.beginPath(); const yy=baseY-20*u-i*18*u;
    gx.moveTo(lx+30*u,yy); gx.quadraticCurveTo(cx,yy-8*u,rx-30*u,yy); gx.stroke(); }
  // due piedini scuri
  gx.fillStyle='#5e3f18';
  gx.beginPath(); gx.ellipse(cx-halfW+30*u,baseY+14*u,18*u,7*u,0,0,6.2832); gx.fill();
  gx.beginPath(); gx.ellipse(cx+halfW-30*u,baseY+14*u,18*u,7*u,0,0,6.2832); gx.fill();

  // ===== QUADRANTE (centrato nel corpo) =====
  const fcx=cx, fcy=humpY+ (baseY-humpY)*0.52, rad=95*u;
  // cornice ottone
  gx.beginPath(); gx.arc(fcx,fcy,rad+12*u,0,6.2832);
  const bez=gx.createLinearGradient(fcx-rad,fcy-rad,fcx+rad,fcy+rad);
  bez.addColorStop(0,'#e6c25a'); bez.addColorStop(.5,'#b8912f'); bez.addColorStop(1,'#e6c25a');
  gx.fillStyle=bez; gx.fill(); gx.lineWidth=2.5*u; gx.strokeStyle='#7a5410'; gx.stroke();
  // faccia avorio
  gx.beginPath(); gx.arc(fcx,fcy,rad,0,6.2832);
  const ivory=gx.createRadialGradient(fcx,fcy-rad*0.3,rad*0.2,fcx,fcy,rad);
  ivory.addColorStop(0,'#fffdf6'); ivory.addColorStop(1,'#f0e6cf');
  gx.fillStyle=ivory; gx.fill();
  // tacche minuti
  for(let i=0;i<60;i++){ const a=i/60*6.2832-Math.PI/2;
    const big=i%5===0; const r1=rad*(big?0.80:0.88), r2=rad*0.93;
    gx.beginPath(); gx.moveTo(fcx+Math.cos(a)*r1,fcy+Math.sin(a)*r1);
    gx.lineTo(fcx+Math.cos(a)*r2,fcy+Math.sin(a)*r2);
    gx.lineWidth=(big?3:1)*u; gx.strokeStyle=big?'#1c1208':'#9a8663'; gx.stroke(); }
  // NUMERI 1-12 neri in stile classico
  gx.fillStyle='#161009'; gx.textAlign='center'; gx.textBaseline='middle';
  gx.font=`700 ${Math.round(22*u)}px Georgia,'Times New Roman',serif`;
  for(let i=1;i<=12;i++){ const a=i/12*6.2832-Math.PI/2;
    gx.fillText(i, fcx+Math.cos(a)*rad*0.68, fcy+Math.sin(a)*rad*0.68); }
  // ===== LANCETTE (ore + minuti) stile classico nero =====
  const now=new Date();
  const m=now.getMinutes()+now.getSeconds()/60;
  const hh=(now.getHours()%12)+m/60;
  function hand(angle,len,wid,color){ const a=angle-Math.PI/2;
    gx.beginPath(); gx.moveTo(fcx-Math.cos(a)*len*0.2,fcy-Math.sin(a)*len*0.2);
    gx.lineTo(fcx+Math.cos(a)*len,fcy+Math.sin(a)*len);
    gx.lineWidth=wid; gx.lineCap='round'; gx.strokeStyle=color; gx.stroke(); }
  hand(hh/12*6.2832, rad*0.52, 7*u, '#161009');   // ore
  hand(m/60*6.2832, rad*0.80, 4.5*u, '#161009');  // minuti
  gx.beginPath(); gx.arc(fcx,fcy,5*u,0,6.2832); gx.fillStyle='#161009'; gx.fill();
}
// orologio sempre visibile in un angolo: ridisegna ~2 volte/sec (bastano ore+minuti)

// 🥚 easter egg debug: 3 tap veloci sull'orologio → menù fasi (alba/giorno/tramonto/notte/auto)
const phaseMenu=document.getElementById('phaseMenu');
let tapCount=0, tapT=0;
clockCanvas.style.pointerEvents='auto';
function highlightPhase(){

    const on=(b.dataset.ph==='auto' && forceDay===null) || b.dataset.ph===forceDay;

clockCanvas.addEventListener('click',()=>{
  const now=performance.now();
  if(now-tapT>800) tapCount=0;
  tapT=now; tapCount++;
  if(tapCount>=3){ tapCount=0; highlightPhase(); phaseMenu.hidden=!phaseMenu.hidden; return; }

  clearTimeout(openBigT);

// l'ora a parole (usa cifre: speechSynthesis le legge giuste per lingua)
function timeSentence(){
  const now=new Date(); let h=now.getHours(); const m=now.getMinutes();
  const h12=((h%12)||12);
  let mainH=h12, phrase;
  if(m===0) phrase=`${L.timeIntro} ${h12} ${L.oclock}`;
  else if(m===15) phrase=`${L.timeIntro} ${h12} ${L.quarter}`.replace('{h}',h12);
  else if(m===30) phrase=`${L.timeIntro} ${h12} ${L.half}`;
  else if(m===45){ const nh=((h12%12)+1); phrase=`${L.timeIntro} ${nh} ${L.threeQuarter}`; }
  else phrase=`${L.timeIntro} ${h12} ${L.and} ${m} ${L.minutes}`.replace(/\s+/g,' ').trim();
  // en: "quarter past 3", "half past 3" hanno l'ora DOPO
  if(LANG.slice(0,2)==='en'){
    if(m===0) phrase=`${L.timeIntro} ${h12} ${L.oclock}`;
    else if(m===15) phrase=`${L.timeIntro} ${L.quarter} ${h12}`;
    else if(m===30) phrase=`${L.timeIntro} ${L.half} ${h12}`;
    else if(m===45){ const nh=((h12%12)+1); phrase=`${L.timeIntro} ${L.threeQuarter} ${nh}`; }
    else phrase=`${L.timeIntro} ${h12} ${m}`;
  }
  return phrase;
}
function pickVoice(lang){
  if(!window.speechSynthesis) return null;
  const vs=speechSynthesis.getVoices()||[];
  const two=lang.slice(0,2).toLowerCase();
  return vs.find(v=>v.lang && v.lang.toLowerCase()===lang.toLowerCase())      // it-IT esatto
      || vs.find(v=>v.lang && v.lang.toLowerCase().slice(0,2)===two)          // stessa lingua
      || null;
}
function sayTime(){
  const txt=timeSentence();
  clockSpeech.textContent=txt; clockSpeech.hidden=false;   // il fumetto scritto c'è sempre
  const v=pickVoice(LANG);
  if(window.speechSynthesis && v){                          // parla SOLO se c'è la voce giusta
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(txt); u.lang=LANG; u.rate=0.9; u.voice=v;
    speechSynthesis.speak(u);
  }
  clearTimeout(sayTime._t); sayTime._t=setTimeout(()=>{ clockSpeech.hidden=true; }, 5000);
}
document.getElementById('owlHelper').addEventListener('click',e=>{ e.stopPropagation(); sayTime(); });

// ── POSTER intro: tutti gli animali nel paesaggio (riusa drawCreature) ──
function drawPoster(){
  const pc=document.getElementById('poster'); if(!pc) return;
  const dpr=Math.min(2,window.devicePixelRatio||1);
  const w=pc.width=innerWidth*dpr, h=pc.height=innerHeight*dpr;
  pc.style.width=innerWidth+'px'; pc.style.height=innerHeight+'px';
  const g=pc.getContext('2d');
  // sfondo: cielo → prato/acqua
  const sky=g.createLinearGradient(0,0,0,h);
  sky.addColorStop(0,'#5aa9ff'); sky.addColorStop(0.55,'#8fd0e8'); sky.addColorStop(0.56,'#7fc47a'); sky.addColorStop(1,'#4f9e6a');
  g.fillStyle=sky; g.fillRect(0,0,w,h);
  // sole
  g.beginPath(); g.arc(w*0.82,h*0.16,34*dpr,0,6.29); g.fillStyle='rgba(255,235,160,.9)'; g.fill();
  // laghetto
  g.beginPath(); g.ellipse(w*0.5,h*0.72,w*0.42,h*0.16,0,0,6.29); g.fillStyle='#5aa9ff'; g.fill();
  g.beginPath(); g.ellipse(w*0.5,h*0.72,w*0.42,h*0.16,0,0,6.29); g.strokeStyle='rgba(255,255,255,.25)'; g.lineWidth=2*dpr; g.stroke();
  // qualche albero silhouette
  g.fillStyle='rgba(30,90,60,.55)';
  for(let i=0;i<5;i++){ const x=(0.08+i*0.21)*w, base=h*0.58, hh=h*0.12;
    g.beginPath(); g.moveTo(x,base); g.lineTo(x-hh*0.55,base-hh*0.5); g.lineTo(x-hh*0.2,base-hh*0.5);
    g.lineTo(x-hh*0.6,base-hh); g.lineTo(x,base-hh*1.35); g.lineTo(x+hh*0.6,base-hh);
    g.lineTo(x+hh*0.2,base-hh*0.5); g.lineTo(x+hh*0.55,base-hh*0.5); g.closePath(); g.fill(); }
  // un OVALE solo, largo, attorno al titolo centrale (riusa drawCreature via swap ctx)
  const prevCtx=ctx, prevDPR=DPR; ctx=g; DPR=dpr;
  const ccx=w*0.5, ccy=h*0.48;
  const n=CAST.length;
  const rx=w*0.40, ry=h*0.33;
  const sz=Math.min(w,h)*0.04;
  // distribuzione per LUNGHEZZA D'ARCO uguale (non ad angolo): evita l'affollamento ai lati dell'ovale
  const SAMP=1440, cum=[0];
  let px=Math.cos(-Math.PI/2)*rx, py=Math.sin(-Math.PI/2)*ry;
  for(let k=1;k<=SAMP;k++){ const a=-Math.PI/2 + k/SAMP*6.2832;
    const x=Math.cos(a)*rx, y=Math.sin(a)*ry;
    cum.push(cum[k-1]+Math.hypot(x-px,y-py)); px=x; py=y; }
  const total=cum[SAMP];
  function angleAtArc(s){ // trova l'angolo alla frazione d'arco s
    let lo=0,hi=SAMP; while(lo<hi){ const mid=(lo+hi)>>1; if(cum[mid]<s) lo=mid+1; else hi=mid; }
    return -Math.PI/2 + lo/SAMP*6.2832;
  }
  CAST.forEach((c,i)=>{
    const a=angleAtArc(i/n*total);
    const cx=ccx+Math.cos(a)*rx, cy=ccy+Math.sin(a)*ry;
    g.save(); g.translate(cx,cy);
    g.beginPath(); g.arc(0,0,sz*1.55,0,6.29); g.fillStyle=hexA(c.colors[0],0.12); g.fill();
    const face=(i%2)?-1:1; g.save(); g.scale(face,1); drawCreature({...c,sleep:0}, sz); g.restore();
    // nome sotto, contorno scuro
    g.font=`700 ${Math.round(sz*0.72)}px system-ui,sans-serif`;
    g.textAlign='center'; g.textBaseline='top';
    g.lineWidth=Math.max(2,sz*0.16); g.strokeStyle='rgba(0,0,0,.72)'; g.lineJoin='round';
    g.strokeText(c.name, 0, sz*1.5); g.fillStyle='#fff'; g.fillText(c.name, 0, sz*1.5);
    g.restore();
  });
  ctx=prevCtx; DPR=prevDPR;
}

function buildInfoTable(){
  document.getElementById('infoVer').textContent=APP_VERSION;
  const tb=document.querySelector('#infoTable tbody'); if(tb.childElementCount) return; // una volta sola
  const prevCtx=ctx, prevDPR=DPR;
  CAST.forEach(c=>{
    const tr=document.createElement('tr');
    const tdP=document.createElement('td'); tdP.className='pic';
    const mc=document.createElement('canvas'); const d=Math.min(2,window.devicePixelRatio||1);
    mc.width=44*d; mc.height=44*d; mc.style.width='44px'; mc.style.height='44px';
    const mg=mc.getContext('2d'); ctx=mg; DPR=d;
    mg.save(); mg.translate(22*d,26*d);
    mg.beginPath(); mg.arc(0,0,17*d,0,6.29); mg.fillStyle=hexA(c.colors[0],0.14); mg.fill();
    drawCreature({...c,sleep:0}, 13*d);
    mg.restore();
    tdP.appendChild(mc);
    const tdI=document.createElement('td');
    const info=charInfo(c);
    tdI.innerHTML=`<div class="nm">${c.name}</div><div class="tp">${info[0]}</div><div class="ds">${info[1]}</div>`;
    tr.appendChild(tdP); tr.appendChild(tdI); tb.appendChild(tr);
  });
  ctx=prevCtx; DPR=prevDPR;
}
